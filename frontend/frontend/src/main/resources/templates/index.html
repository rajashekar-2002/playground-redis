<!DOCTYPE html>
<html>
<head>
    <title>Redis Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: #f5f6fa;
            color: #3a3a4c;
            min-height: 100vh;
        }

        /* ── Page wrapper ── */
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 36px 32px;
        }

        /* ── Header ── */
        .page-header {
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1e1e2e;
            letter-spacing: -0.3px;
        }

        .page-header p {
            margin-top: 4px;
            color: #8e8ea0;
            font-size: 13px;
        }

        /* ── Controls bar ── */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid #e8e8f0;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 28px;
        }

        .controls select,
        .controls input {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #3a3a4c;
            background: #f5f6fa;
            border: 1px solid #e0e0ec;
            border-radius: 7px;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .controls select:focus,
        .controls input:focus {
            border-color: #a0a0e0;
        }

        .controls input { width: 160px; }
        .controls input:disabled { opacity: 0.45; cursor: not-allowed; }

        .controls button {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            background: #5c5ce0;
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 8px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .controls button:hover { background: #4848c8; }

        /* ── Two-column layout ── */
        .main-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .left-panel { flex: 1; min-width: 0; }

        .right-panel {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Card base ── */
        .card {
            background: #fff;
            border: 1px solid #e8e8f0;
            border-radius: 10px;
            padding: 18px;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8e8ea0;
            margin-bottom: 14px;
        }

        /* ── Operations log ── */
        #kvAckList {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-item {
            background: #fff;
            border: 1px solid #e8e8f0;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            border-left: 3px solid #e0e0ec;
        }

        .log-item.initiated { border-left-color: #f5c842; background: #fffdf0; }
        .log-item.success   { border-left-color: #4caf82; background: #f2fbf7; }
        .log-item.failed    { border-left-color: #e05c5c; background: #fdf2f2; }

        .log-item .log-op   { font-weight: 600; color: #1e1e2e; }
        .log-item .log-meta { color: #8e8ea0; font-size: 12px; margin-top: 4px; }
        .log-item .log-status-ok   { color: #4caf82; font-size: 12px; }
        .log-item .log-status-fail { color: #e05c5c; font-size: 12px; }

        /* ── Health block ── */
        .health-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .health-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #f5f6fa;
            border-radius: 7px;
            font-size: 13px;
        }

        .health-name { flex: 1; color: #3a3a4c; }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #d0d0e0;
            flex-shrink: 0;
            transition: background 0.4s, box-shadow 0.4s;
        }
        .dot.up   { background: #4caf82; box-shadow: 0 0 5px #4caf8270; }
        .dot.down { background: #e05c5c; }

        .status-text { font-size: 11px; font-weight: 500; }
        .status-text.up   { color: #4caf82; }
        .status-text.down { color: #e05c5c; }

        .svc-empty { color: #b0b0c0; font-size: 12px; font-style: italic; }

        /* ── Trace chain ── */
        #traceList {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .trace-entry {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .trace-bubble {
            background: #f0f0fb;
            border: 1px solid #e0e0f0;
            border-radius: 7px;
            padding: 7px 12px;
            font-size: 12.5px;
            font-family: 'Inter', sans-serif;
            color: #3a3a4c;
            max-width: 100%;
            word-break: break-all;
        }

        .trace-bubble .svc-name {
            font-weight: 600;
            color: #5c5ce0;
        }

        .trace-arrow {
            font-size: 14px;
            color: #c0c0d8;
            margin: 3px 0 3px 10px;
            line-height: 1;
        }

        /* ── Divider between sections ── */
        .section-divider {
            height: 1px;
            background: #e8e8f0;
            margin: 4px 0 14px 0;
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Header -->
    <div class="page-header">
        <h1>Redis Playground</h1>
        <p>Real-time key-value operations over Kafka + WebSocket</p>
    </div>

    <!-- Controls -->
    <div class="controls">
        <select id="operation">
            <option value="ADD">ADD</option>
            <option value="DELETE">DELETE</option>
            <option value="UPDATE">UPDATE</option>
            <option value="GET">GET</option>
            <option value="SET_TTL">SET_TTL</option>
            <option value="PAUSE_KAFKA">PAUSE_KAFKA</option>
            <option value="FETCH_ALL">FETCH_ALL</option>
        </select>
        <input type="text" id="key" placeholder="Key">
        <input type="text" id="value" placeholder="Value">
        <button onclick="sendOperation()">Send</button>
    </div>

    <!-- Two-column layout -->
    <div class="main-layout">

        <!-- LEFT — Operations log -->
        <div class="left-panel card">
            <div class="card-title">Operations Log</div>
            <ul id="kvAckList"></ul>
        </div>

        <!-- RIGHT — Health + Trace -->
        <div class="right-panel">

            <!-- Health card -->
            <div class="card">
                <div class="card-title">Infrastructure</div>
                <div class="health-row">
                    <div class="health-chip">
                        <span class="dot" id="dotKafka"></span>
                        <span class="health-name">Kafka</span>
                        <span class="status-text" id="txtKafka">—</span>
                    </div>
                    <div class="health-chip">
                        <span class="dot" id="dotRedis"></span>
                        <span class="health-name">Redis</span>
                        <span class="status-text" id="txtRedis">—</span>
                    </div>
                    <div class="health-chip">
                        <span class="dot" id="dotRabbit"></span>
                        <span class="health-name">RabbitMQ</span>
                        <span class="status-text" id="txtRabbit">—</span>
                    </div>
                    <div class="health-chip">
                        <span class="dot" id="dotMongo"></span>
                        <span class="health-name">MongoDB</span>
                        <span class="status-text" id="txtMongo">—</span>
                    </div>
                </div>

                <div class="section-divider" style="margin-top:14px;"></div>
                <div class="card-title">Services</div>
                <div class="health-row" id="svcRow">
                    <span class="svc-empty">waiting for services...</span>
                </div>
            </div>

            <!-- Trace card -->
            <div class="card">
                <div class="card-title">Trace</div>
                <ul id="traceList"></ul>
            </div>

        </div>
    </div>
</div>

<script>

    let stompClient = null;

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {

            // kv-updates — left panel
            stompClient.subscribe('/topic/kv-updates', function (message) {
                showKVAck(message.body);
                try {
                    const r = JSON.parse(message.body);
                    if (r.operation === 'DELETE' && r.status === 'SUCCESS') {
                        removeKeyFromTable(r.key);
                    }
                } catch(e) {}
            });

            // trace-updates — right panel
            stompClient.subscribe('/topic/trace-updates', function (message) {
                showTrace(message.body);
            });

            // health-updates — right panel health card
            stompClient.subscribe('/topic/health-updates', function (message) {
                updateHealth(JSON.parse(message.body));
            });
        });
    }

    connect();

    // ── Health ───────────────────────────────────────────────────────
    function updateHealth(data) {
        setInfra('dotKafka',  'txtKafka',  data.kafkaUp);
        setInfra('dotRedis',  'txtRedis',  data.redisUp);
        setInfra('dotRabbit', 'txtRabbit', data.rabbitUp);
        setInfra('dotMongo',  'txtMongo',  data.mongoUp);

        const svcRow  = document.getElementById('svcRow');
        const instances = data.serviceInstances || {};
        const names   = Object.keys(instances);

        if (names.length === 0) {
            svcRow.innerHTML = '<span class="svc-empty">no services yet</span>';
            return;
        }

        svcRow.innerHTML = names.map(name => {
            const isUp = instances[name] === 'UP';
            return `<div class="health-chip">
                        <span class="dot ${isUp ? 'up' : 'down'}"></span>
                        <span class="health-name">${name}</span>
                        <span class="status-text ${isUp ? 'up' : 'down'}">${isUp ? 'UP' : 'DOWN'}</span>
                    </div>`;
        }).join('');
    }

    function setInfra(dotId, txtId, isUp) {
        document.getElementById(dotId).className = 'dot ' + (isUp ? 'up' : 'down');
        const txt = document.getElementById(txtId);
        txt.textContent = isUp ? 'UP' : 'DOWN';
        txt.className   = 'status-text ' + (isUp ? 'up' : 'down');
    }

    // ── Trace ────────────────────────────────────────────────────────
    function showTrace(raw) {
        const data = JSON.parse(raw);
        const ul   = document.getElementById('traceList');

        if (ul.children.length > 0) {
            const arrowLi = document.createElement('li');
            arrowLi.className = 'trace-entry';
            arrowLi.innerHTML = `<span class="trace-arrow">↓</span>`;
            ul.appendChild(arrowLi);
        }

        const li = document.createElement('li');
        li.className = 'trace-entry';
        li.innerHTML = `<div class="trace-bubble">
            <span class="svc-name">[${data.serviceName || 'unknown'}]</span> : ${data.payload || '-'}
        </div>`;
        ul.appendChild(li);
    }

    // ── Send operation ───────────────────────────────────────────────
    function sendOperation() {
        const operation = document.getElementById("operation").value;
        const key       = document.getElementById("key").value;
        const value     = document.getElementById("value").value;

        stompClient.send("/app/operate", {}, JSON.stringify({ operation, key, value }));

        document.getElementById("key").value   = "";
        document.getElementById("value").value = "";
    }

    // ── Field disable logic ──────────────────────────────────────────
    document.getElementById("operation").addEventListener("change", function () {
        const op         = this.value;
        const keyInput   = document.getElementById("key");
        const valueInput = document.getElementById("value");

        if (op === "FETCH_ALL") {
            keyInput.disabled = true; valueInput.disabled = true;
            keyInput.value = ""; valueInput.value = "";
        } else if (op === "DELETE" || op === "GET") {
            keyInput.disabled = false; valueInput.disabled = true; valueInput.value = "";
        } else if (op === "SET_TTL") {
            keyInput.disabled = false; valueInput.disabled = false;
            valueInput.placeholder = "TTL (max 10 sec)";
        } else if (op === "PAUSE_KAFKA") {
            keyInput.disabled = true; valueInput.disabled = false;
            valueInput.placeholder = "Pause seconds (max 10)";
        } else {
            keyInput.disabled = false; valueInput.disabled = false;
            valueInput.placeholder = "Value";
        }
    });

    // ── Render kv-updates ────────────────────────────────────────────
    function showKVAck(message) {
        const data = JSON.parse(message);
        const ul   = document.getElementById('kvAckList');
        const li   = document.createElement('li');

        let cls = "log-item initiated";
        if (data.status === "SUCCESS") cls = "log-item success";
        if (data.status === "FAILED")  cls = "log-item failed";
        li.className = cls;

        if (data.operation === "FETCH_ALL" && data.data) {
            let table = "<table border='1' cellpadding='5' style='margin-top:6px;font-size:12px'><tr><th>Key</th><th>Value</th></tr>";
            for (const key in data.data) {
                table += `<tr><td>${key}</td><td>${data.data[key]}</td></tr>`;
            }
            table += "</table>";
            li.innerHTML = `<span class="log-op">FETCH_ALL</span>
                <div class="log-meta">Status: ${data.status} &nbsp;·&nbsp; ${data.completedAt || ''}</div>
                ${table}`;
        } else {
            const statusCls = data.status === 'SUCCESS' ? 'log-status-ok' : 'log-status-fail';
            li.innerHTML = `<span class="log-op">${data.operation}</span>
                &nbsp;→&nbsp; <b>${data.key || '-'}</b>
                ${data.value ? `&nbsp;:&nbsp; <b>${data.value}</b>` : ''}
                <div class="log-meta">
                    <span class="${statusCls}">${data.status}</span>
                    ${data.message ? ' &nbsp;·&nbsp; ' + data.message : ''}
                    &nbsp;·&nbsp; <span>${data.completedAt || data.timestamp || ''}</span>
                </div>`;
        }

        ul.prepend(li);
    }

</script>
</body>
</html>
